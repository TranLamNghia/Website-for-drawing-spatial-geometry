<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Pyramid – Hidden Line Removal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fafaf7;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    canvas {
      display: block;
    }

    .vertex-label {
      color: #1a1a2e;
      font-size: 18px;
      font-weight: bold;
      font-style: italic;
      font-family: 'Georgia', 'Times New Roman', serif;
      pointer-events: none;
      user-select: none;
      text-shadow: 2px 2px 0 #fafaf7, -2px -2px 0 #fafaf7, 2px -2px 0 #fafaf7,
        -2px 2px 0 #fafaf7, 0 2px 0 #fafaf7, 0 -2px 0 #fafaf7, 2px 0 0 #fafaf7, -2px 0 0 #fafaf7;
    }

    #info {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      pointer-events: none;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #333;
      font-size: 20px;
      font-style: italic;
      pointer-events: none;
    }

    #debug {
      position: absolute;
      top: 60px;
      left: 16px;
      color: #666;
      font-size: 13px;
      font-family: 'Consolas', 'Courier New', monospace;
      pointer-events: none;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div id="title">Hình chóp tứ giác đều S.ABCD</div>
  <div id="debug"></div>
  <div id="info">Chuột trái: Xoay &nbsp;·&nbsp; Cuộn: Thu phóng &nbsp;·&nbsp; Chuột phải: Di chuyển</div>

  <script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
}}
</script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ── Scene ────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xfafaf7);

    // Camera: Z-up (Oz = trục cao, Ox = trục hoành, Oy = trục tung)
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.up.set(0, 0, 1);          // Z is UP
    camera.position.set(5, -4, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    document.body.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 2.5;
    controls.maxDistance = 15;

    // ── Pyramid Vertices (Z-up convention) ───────────────────────
    // Base ABCD in the xOy plane at z = -H
    // Apex S on Oz at z = +H
    const H = 1.2, R = 1.0, t = 0.5;

    const V = [
      new THREE.Vector3(0, 0, H),         // 0: S (apex, on Oz)
      new THREE.Vector3(-R, -R, -H),      // 1: A
      new THREE.Vector3(R, -R, -H),       // 2: B
      new THREE.Vector3(R, R, -H),        // 3: C
      new THREE.Vector3(-R, R, -H),       // 4: D
      // Cross-section midpoints (at z = 0)
      new THREE.Vector3().lerpVectors(new THREE.Vector3(0, 0, H), new THREE.Vector3(-R, -R, -H), t), // 5: M
      new THREE.Vector3().lerpVectors(new THREE.Vector3(0, 0, H), new THREE.Vector3(R, -R, -H), t),  // 6: N
      new THREE.Vector3().lerpVectors(new THREE.Vector3(0, 0, H), new THREE.Vector3(R, R, -H), t),   // 7: P
      new THREE.Vector3().lerpVectors(new THREE.Vector3(0, 0, H), new THREE.Vector3(-R, R, -H), t),  // 8: Q
    ];

    // ── Vertex Labels ────────────────────────────────────────────
    const labelDefs = [
      { text: 'S', off: [0, 0, 0.3] },
      { text: 'A', off: [-0.22, -0.22, -0.25] },
      { text: 'B', off: [0.22, -0.22, -0.25] },
      { text: 'C', off: [0.22, 0.22, -0.25] },
      { text: 'D', off: [-0.22, 0.22, -0.25] },
      { text: 'M', off: [-0.28, -0.05, 0.1] },
      { text: 'N', off: [0.28, -0.05, 0.1] },
      { text: 'P', off: [0.28, 0.05, 0.1] },
      { text: 'Q', off: [-0.28, 0.05, 0.1] },
    ];
    labelDefs.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'vertex-label';
      el.textContent = d.text;
      const lbl = new CSS2DObject(el);
      lbl.position.set(V[i].x + d.off[0], V[i].y + d.off[1], V[i].z + d.off[2]);
      scene.add(lbl);
    });

    // Vertex dots
    const dotGeo = new THREE.SphereGeometry(0.04, 16, 16);
    const dotMat = new THREE.MeshBasicMaterial({ color: 0x1a1a2e });
    V.forEach(v => { const d = new THREE.Mesh(dotGeo, dotMat); d.position.copy(v); scene.add(d); });

    // ── Face Normals (5 faces: 4 sides + bottom) ─────────────────
    // Winding order gives outward-pointing normals for Z-up geometry
    const faceDefs = [
      { tri: [0, 1, 2], verts: [0, 1, 2] },       // face 0: SAB → normal ~−y
      { tri: [0, 2, 3], verts: [0, 2, 3] },       // face 1: SBC → normal ~+x
      { tri: [0, 3, 4], verts: [0, 3, 4] },       // face 2: SCD → normal ~+y
      { tri: [0, 4, 1], verts: [0, 4, 1] },       // face 3: SDA → normal ~−x
      { tri: [1, 3, 2], verts: [1, 2, 3, 4] },    // face 4: bottom → normal −z
    ];
    const faceData = faceDefs.map(f => {
      const tri = new THREE.Triangle(V[f.tri[0]], V[f.tri[1]], V[f.tri[2]]);
      const normal = new THREE.Vector3(); tri.getNormal(normal);
      const centroid = new THREE.Vector3();
      f.verts.forEach(i => centroid.add(V[i]));
      centroid.divideScalar(f.verts.length);
      return { normal, centroid };
    });

    // ── Edge Definitions [vA, vB, face1, face2] ──────────────────
    const edgeDefs = [
      // Lateral
      [0, 1, 0, 3],  // S–A
      [0, 2, 0, 1],  // S–B
      [0, 3, 1, 2],  // S–C
      [0, 4, 2, 3],  // S–D
      // Base (lateral face + bottom)
      [1, 2, 0, 4],  // A–B
      [2, 3, 1, 4],  // B–C
      [3, 4, 2, 4],  // C–D
      [4, 1, 3, 4],  // D–A
      // Cross-section
      [5, 6, 0, 0],  // M–N on face SAB
      [6, 7, 1, 1],  // N–P on face SBC
      [7, 8, 2, 2],  // P–Q on face SCD
      [8, 5, 3, 3],  // Q–M on face SDA
    ];

    // ── Pyramid fill (semi-transparent) ──────────────────────────
    const fillArr = [];
    [[0, 1, 2], [0, 2, 3], [0, 3, 4], [0, 4, 1]].forEach(t => t.forEach(i => fillArr.push(V[i].x, V[i].y, V[i].z)));
    [1, 3, 2, 1, 4, 3].forEach(i => fillArr.push(V[i].x, V[i].y, V[i].z));
    const fillGeo = new THREE.BufferGeometry();
    fillGeo.setAttribute('position', new THREE.Float32BufferAttribute(fillArr, 3));
    fillGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(fillGeo, new THREE.MeshBasicMaterial({
      color: 0x4dd0e1, opacity: 0.08, transparent: true, side: THREE.DoubleSide, depthWrite: false,
    })));

    // ── Cross-section fill (MNPQ) ────────────────────────────────
    const secArr = [];
    [5, 6, 7, 5, 7, 8].forEach(i => secArr.push(V[i].x, V[i].y, V[i].z));
    const secGeo = new THREE.BufferGeometry();
    secGeo.setAttribute('position', new THREE.Float32BufferAttribute(secArr, 3));
    secGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(secGeo, new THREE.MeshBasicMaterial({
      color: 0xffa726, opacity: 0.15, transparent: true, side: THREE.DoubleSide, depthWrite: false,
    })));

    // ── Edge line buffers (dynamic) ──────────────────────────────
    const MAX = edgeDefs.length * 2;

    const solidBuf = new Float32Array(MAX * 3);
    const solidGeo = new THREE.BufferGeometry();
    const solidAttr = new THREE.BufferAttribute(solidBuf, 3);
    solidAttr.setUsage(THREE.DynamicDrawUsage);
    solidGeo.setAttribute('position', solidAttr);
    const solidLines = new THREE.LineSegments(solidGeo, new THREE.LineBasicMaterial({ color: 0x1a1a2e }));
    scene.add(solidLines);

    const dashedBuf = new Float32Array(MAX * 3);
    const dashedGeo = new THREE.BufferGeometry();
    const dashedAttr = new THREE.BufferAttribute(dashedBuf, 3);
    dashedAttr.setUsage(THREE.DynamicDrawUsage);
    dashedGeo.setAttribute('position', dashedAttr);
    const dashedLines = new THREE.LineSegments(dashedGeo,
      new THREE.LineDashedMaterial({ color: 0x999999, dashSize: 0.12, gapSize: 0.08 })
    );
    scene.add(dashedLines);

    // ── Per-frame HLR ────────────────────────────────────────────
    const EPS = 0.015;
    const _v = new THREE.Vector3();

    function updateEdges() {
      const cam = camera.position;
      const front = faceData.map(f => {
        _v.copy(cam).sub(f.centroid).normalize();
        return _v.dot(f.normal) > -EPS;
      });

      let si = 0, di = 0;
      for (const [a, b, f1, f2] of edgeDefs) {
        const va = V[a], vb = V[b];
        if (front[f1] || front[f2]) {
          solidBuf[si++] = va.x; solidBuf[si++] = va.y; solidBuf[si++] = va.z;
          solidBuf[si++] = vb.x; solidBuf[si++] = vb.y; solidBuf[si++] = vb.z;
        } else {
          dashedBuf[di++] = va.x; dashedBuf[di++] = va.y; dashedBuf[di++] = va.z;
          dashedBuf[di++] = vb.x; dashedBuf[di++] = vb.y; dashedBuf[di++] = vb.z;
        }
      }

      solidAttr.needsUpdate = true;
      solidGeo.setDrawRange(0, si / 3);
      dashedAttr.needsUpdate = true;
      dashedGeo.setDrawRange(0, di / 3);
      dashedLines.computeLineDistances();
    }

    // ── Grid (in xOy plane, at z = -H) ──────────────────────────
    const grid = new THREE.GridHelper(8, 16, 0xdddddd, 0xeeeeee);
    grid.rotation.x = Math.PI / 2;          // Rotate from XZ plane to XY plane
    grid.position.z = -H - 0.01;
    scene.add(grid);

    // ── Resize ───────────────────────────────────────────────────
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });

    // ── Render Loop ──────────────────────────────────────────────
    const debugEl = document.getElementById('debug');
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateEdges();
      const p = camera.position;
      debugEl.textContent = `Camera: x=${p.x.toFixed(2)}  y=${p.y.toFixed(2)}  z=${p.z.toFixed(2)}`;
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
